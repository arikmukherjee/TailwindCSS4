<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Size in Tailwind CSS</title>
    <link rel="stylesheet" href="output.css">
</head>
<body class="h-screen">
    <div class="bg-pink-400 w-50 h-50">Code step by step</div>
    <div class="bg-amber-400 size-50">Code step by step</div>
    <div class="bg-blue-400 size-[100px]">Code step by step</div>
    <div class="bg-green-400 size-full">Code step by step</div>
    <div class="bg-purple-400 size-50 hover:size-2xs hover:bg-amber-300">HOVER</div>
</body>
</html>
