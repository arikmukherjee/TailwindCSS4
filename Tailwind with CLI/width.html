<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max width in tailwind css</title>
    <link rel="stylesheet" href="output.css">
</head>
<body>
    <h1>Max Width in Tailwind CSS</h1>
    <div class="bg-pink-400 w-200">Code step by step</div>
    <div class="bg-blue-400 w-40">Code step by step</div>
    <div class="bg-blue-400 max-w-50">Code step by step</div>
    <div class="bg-blue-400 min-w-20 w-10">Code step by step</div>
    <div class="bg-green-400 w-full">Code step by step</div>
    <div class="bg-green-400 w-1/2">Code step by step</div>
    <div class="bg-yellow-400 w-xs">Code step by step</div>
    <div class="bg-green-400 w-[10px]">Auto width</div>
    <div class="bg-purple-400 w-50 hover:w-2xs hover:bg-amber-300">HOVER</div>
</body>
</html>
