<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Header</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>
    /* Reset default margin */
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* Navbar styling */
.navbar {
    background-color: black;
    padding: 10px 20px;
}

/* Remove bullets */
.navbar ul {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
}

/* List items */
.navbar li {
    margin-right: 20px;
}

/* Links */
.navbar a {
    text-decoration: none;
    color: white;
    font-size: 16px;
    transition: 0.3s;
}

/* Hover effect */
.navbar a:hover {
    color: #f1c40f;
}
</style>
<body>

<header>
    <nav class="navbar">
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">News</a></li>
            <li><a href="#">Contact</a></li>
            <li><a href="#">About</a></li>
        </ul>
    </nav>
</header>

</body>
</html>
