<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Height in Tailwind CSS</title>
    <link rel="stylesheet" href="output.css">
</head>
<body>
    <h1>Height in Tailwind CSS</h1>
    <div class="bg-pink-400 h-200">Code step by step</div>
    <div class="bg-blue-400 h-40">Code step by step</div>
    <div class="bg-blue-400 max-h-50">Code step by step</div>
    <div class="bg-blue-400 min-h-20 h-10">Code step by step</div>
    <div class="bg-green-400 h-full">Code step by step</div>
    <div class="bg-green-400 h-1/2">Code step by step</div>
    <div class="bg-yellow-400 h-xs">Code step by step</div>
    <div class="bg-green-400 h-[10px]">Auto height</div>
    <div class="bg-purple-400 h-50 hover:h-2xs hover:bg-amber-300">HOVER</div>
    <div class="bg-red-400 h-screen">Code step by step</div>
</body>
</html>
