<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Positions in Tailwind CSS</title>
    <link rel="stylesheet" href="output.css" />
  </head>
  <body>
    <!-- <h1>Positions in Tailwind CSS</h1>
    <div class="bg-pink-400 absolute top-0 left-0">Code step by step</div>
    <div class="bg-blue-400 absolute top-0 right-0">Code step by step</div>
    <div class="bg-green-400 absolute bottom-0 left-0">Code step by step</div>
    <div class="bg-yellow-400 absolute bottom-0 right-0">Code step by step</div>
    <div class="bg-purple-400 absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2">Code step by step</div> -->

    <div class="bg-amber-500 size-90 relative">
      <div class="bg-pink-400 absolute size-20 top-0 left-0">
        Code step by step
      </div>
      <div class="bg-blue-400 absolute size-20 top-0 right-0">
        Code step by step
      </div>
      <div class="bg-green-400 absolute size-20 bottom-0 left-0">
        Code step by step
      </div>
      <div class="bg-yellow-400 absolute size-20 bottom-0 right-0">
        Code step by step
      </div>
      <div
        class="bg-purple-400 absolute size-20 top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2"
      >
        Code step by step
      </div>
    </div>


    <div>
        <h1 class="fixed z-20">HELLO </h1>
    </div>


    <div class="bg-amber-500 size-90 relative">
      <div class="bg-pink-400 absolute size-20 top-0 left-0">
        Code step by step
      </div>
      <div class="bg-blue-400 absolute size-20 top-0 right-0">
        Code step by step
      </div>
      <div class="bg-green-400 absolute size-20 bottom-0 left-0">
        Code step by step
      </div>
      <div class="bg-yellow-400 absolute size-20 bottom-0 right-0">
        Code step by step
      </div>
      <div
        class="bg-purple-400 absolute size-20 top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2"
      >
        Code step by step
      </div>
    </div>
  </body>
</html>
