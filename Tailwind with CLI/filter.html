<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filters in Tailwind CSS</title>
    <link rel="stylesheet" href="output.css">
</head>
<body>
    <h1 class="text-2xl underline">Blur Effect</h1>
    <img class="blur-sm" src="/monkey.jpg" alt="" >
    <img class="blur-md" src="/monkey.jpg" alt="" >
    <img class="blur-lg" src="/monkey.jpg" alt="" >
    <img class="blur-2xl" src="/monkey.jpg" alt="" >
    <h1 class="blur-xs">Blur Effect</h1>

    <h1 class="text-2xl underline">Brightness Effect</h1>
    <img class="brightness-0" src="/monkey.jpg" alt="" >
    <img class="brightness-50" src="/monkey.jpg" alt="" >
    <img class="brightness-75" src="/monkey.jpg" alt="" >
    <img class="brightness-90" src="/monkey.jpg" alt="" >
    <img class="brightness-95" src="/monkey.jpg" alt="" >
    <img class="brightness-100" src="/monkey.jpg" alt="" >
    <img class="brightness-105" src="/monkey.jpg" alt="" >
    <img class="brightness-110" src="/monkey.jpg" alt="" >
    <img class="brightness-125" src="/monkey.jpg" alt="" >
    <img class="brightness-150" src="/monkey.jpg" alt="" >
    <img class="brightness-200" src="/monkey.jpg" alt="" >

    <h1 class="text-2xl underline">Contrast Effect</h1>
    <img class="contrast-0" src="/monkey.jpg" alt="" >
    <img class="contrast-50" src="/monkey.jpg" alt="" >
    <img class="contrast-75" src="/monkey.jpg" alt="" >
    <img class="contrast-100" src="/monkey.jpg" alt="" >
    <img class="contrast-125" src="/monkey.jpg" alt="" >
    <img class="contrast-150" src="/monkey.jpg" alt="" >
    <img class="contrast-200" src="/monkey.jpg" alt="" >



    <h1 class="text-2xl underline">Grayscale Effect</h1>
    <img class="grayscale" src="/monkey.jpg" alt="" >
    
    
    <h1 class="text-2xl underline">Hue Rotate Effect</h1>
    <img class="hue-rotate-15" src="/monkey.jpg" alt="" >
    <img class="hue-rotate-30" src="/monkey.jpg" alt="" >
    <img class="hue-rotate-60" src="/monkey.jpg" alt="" >
    <img class="hue-rotate-90" src="/monkey.jpg" alt="" >
    <img class="hue-rotate-180" src="/monkey.jpg" alt="" >



    <h1 class="text-2xl underline">Invert Effect</h1>
    <img class="invert" src="/monkey.jpg" alt="" >


    
    <h1 class="text-2xl underline">Saturate Effect</h1>
    <img class="saturate-0" src="/monkey.jpg" alt="" >
    <img class="saturate-50" src="/monkey.jpg" alt="">
    <img class="saturate-100" src="/monkey.jpg" alt="">
</body>
</html>
