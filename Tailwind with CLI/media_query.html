<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Query</title>
    <link rel="stylesheet" href="output.css">
</head>
<body>
    <div class="bg-gray-200 p-4">
        <h1 class="text-2xl font-bold mb-4">Media Query Example</h1>
        <p class="mb-4">Resize the browser window to see the background color change based on the screen width.</p>
        <div class="bg-blue-500 p-4 text-white">
            This box changes color based on the screen width.
        </div>
    </div>
    <h1 class="text-2xl font-bold mb-4">Responsive Background Colors</h1>
    <div class="bg-blue-500 md:bg-green-500 lg:bg-red-500 p-4 text-white mt-4">
        This box changes color based on the screen width.
    </div>
</body>
</html>
